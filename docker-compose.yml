services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fastigo
      POSTGRES_PASSWORD: fastigo123
      POSTGRES_DB: fastigo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastigo -d fastigo"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fastigo:fastigo123@postgres:5432/fastigo
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: super-secret-key-change-me
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: